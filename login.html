<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Hub - Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <nav id="mainNav">
      <a href="index.html">Home</a>
      <a href="Signup.html">Sign Up</a>
      <a href="Workouts.html">Workouts</a>
      <a href="Routes.html">Routes</a>
      <a href="Join.html">Join</a>
      <a href="Contact.html" class="active">Contact Us</a>
    </nav>
  </header>

  <main>
    <section class="split-section">
      <!-- Real Photo: Gym Reception / Door -->
      <div class="split-image" style="background-image: url('https://images.unsplash.com/photo-1683587023194-a24e5b6549b0?q=80&w=764&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');">
        <h2>Welcome Back</h2>
      </div>
      
      <div class="split-form-container">
        <div class="form-box">
          <h3>Member Login</h3>
          <p>Please enter your details to sign in.</p>
          
          <form action="#" method="POST">
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>
            
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="form-group" style="display: flex; justify-content: space-between; font-size: 0.9rem;">
              <label style="font-weight: normal; margin:0;">
                <input type="checkbox" name="remember"> Remember me
              </label>
              <a href="#" style="color: #6a0dad; text-decoration: none;">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-submit">Log In</button>
          </form>

          <div class="contact-info">
            <p>Not a member yet? <a href="Signup.html" style="color:#6a0dad; font-weight: bold;">Create an Account</a></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <h3>Stay Strong. Stay Fit.</h3>
    <p>Train with purpose.</p>
    
    <div class="footer-links">
      <a href="Workouts.html">Classes</a>
      <a href="Join.html">Join Us</a>
      <a href="Contact.html">Contact</a>
    </div>

    <div class="social-icons">
      <!-- Facebook Icon -->
      <a href="https://www.facebook.com/login" target="_blank" class="social-icon-link" aria-label="Log in to Facebook">
        <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>
      </a>

      <!-- Instagram Icon (Enhanced & Detailed) -->
      <a href="https://www.instagram.com/accounts/login" target="_blank" class="social-icon-link" aria-label="Log in to Instagram">

      <!-- Twitter Icon -->
      <a href="https://twitter.com/i/flow/login" target="_blank" class="social-icon-link" aria-label="Log in to Twitter">
        <svg viewBox="0 0 24 24"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path></svg>

    </div>

    <p class="footer-bottom">&copy; 2025 Fit | Keep Moving Forward</p>
  </footer>
