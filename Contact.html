<body>
  <header>

      <a href="Contact.html" class="active">Contact Us</a>
    </nav>

  <main>
    <section class="split-section">
      <div class="split-image" style="background-image: url('https://images.unsplash.com/photo-1571902943202-507ec2618e8f?w=800&q=80');">
        <h2>Get In Touch</h2>
      </div>
      
      <div class="split-form-container">
        <div class="form-box">
          <h3>Contact Support</h3>
          <p>We usually reply within 24 hours.</p>
          
          <form action="#" method="POST">
            <div class="form-group">
              <label for="name">Your Name</label>
              <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
              <label for="email">Your Email</label>
              <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
              <label for="subject">Subject</label>
              <input type="text" id="subject" name="subject" placeholder="Membership Inquiry">
            </div>
            
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" rows="4" required></textarea>
            </div>

            <button type="submit" class="btn-submit">Send Message</button>
          </form>

          <div class="contact-info">
            <p><strong>📍 Location:</strong> 9 street,Maadi</p>
            <p><strong>📞 Phone:</strong> (012) 693-45670</p>
            <p><strong>📧 Email:</strong> help@fitnesshub.com</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <h3>Stay Strong. Stay Fit.</h3>
    <p>Train with purpose.</p>
